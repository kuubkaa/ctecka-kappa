<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <title>E2E harness</title>
  </head>
  <body>
    <!--
      Test-only page, built through the exact same Vite pipeline as the app — same
      wasm asset handling, same version lockstep, same database — so what passes here
      reflects the production build, not the dev server.

      It is added as a build input only when E2E=1, so it never ships to users.
      See build.rollupOptions.input in vite.config.ts.
    -->
    <script type="module">
      import { createDetector } from '../src/lib/scanner'
      import * as db from '../src/db'

      window.__detect = async (canvas) => {
        const results = await createDetector().detect(canvas)
        return results.map((r) => ({ value: r.rawValue, format: r.format }))
      }

      // Lets tests drive db.ts directly — the concurrency the counter fix exists for
      // is not reachable by clicking, because the UI awaits each action in turn.
      window.__db = db

      window.__harnessReady = true
    </script>
  </body>
</html>
